spring.application.name=edifika-forum-service

server.port=8082

# Configuraciˇn de la base de datos local (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/edifika_forum_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuraciˇn de JPA / Hibernate
pring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=com.edifika.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy


# JWT mismo secret que IAM
jwt.secret=${JWT_SECRET:edifika-secret-key-must-be-at-least-32-characters-long}
jwt.expiration.days=${JWT_EXPIRATION_DAYS:365}

# Documentacion
documentation.application.description=@project.description@
documentation.application.version=@project.version@